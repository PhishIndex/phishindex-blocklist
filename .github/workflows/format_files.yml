name: Format Files

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up environment
        run: |
          python3 -V

      - name: Generate JSON and adblock files
        run: |
          set -euo pipefail

          convert_txt_to_json() {
            src="$1"
            dst="$2"
            mkdir -p "$(dirname "$dst")"
            if [ -f "$src" ]; then
              awk 'BEGIN { print "[" }
                   NF { gsub(/^[ \t]+|[ \t]+$/,""); print "  \"" $0 "\"," }
                   END { print "]" }' "$src" > "$dst.tmp"
              mv "$dst.tmp" "$dst"
            else
              printf '[]\n' > "$dst"
            fi
          }

          convert_txt_to_adblock() {
            src="$1"
            dst="$2"
            mkdir -p "$(dirname "$dst")"
            if [ -f "$src" ]; then
              awk 'NF { gsub(/^[ \t]+|[ \t]+$/,""); print "||" $0 "^" }' "$src" > "$dst.tmp"
              mv "$dst.tmp" "$dst"
            else
              printf '' > "$dst"
            fi
          }

          convert_txt_to_json "Data/Malicious Domains/txt/phishindex_domains.txt" "Data/Malicious Domains/json/phishindex_domains.json"
          convert_txt_to_json "Data/Malicious Domains/txt/all_domains.txt" "Data/Malicious Domains/json/all_domains.json"
          convert_txt_to_adblock "Data/Malicious Domains/txt/phishindex_domains.txt" "Data/Malicious Domains/adblock/phishindex_domains.adblock"
          convert_txt_to_adblock "Data/Malicious Domains/txt/all_domains.txt" "Data/Malicious Domains/adblock/all_domains.adblock"

          convert_txt_to_json "Data/IP Logger Domains/ip_logger_domains.txt" "Data/IP Logger Domains/ip_logger_domains.json"
          convert_txt_to_adblock "Data/IP Logger Domains/ip_logger_domains.txt" "Data/IP Logger Domains/ip_logger_domains.adblock"

          convert_txt_to_json "Data/URL Shorteners/url_shorteners.txt" "Data/URL Shorteners/url_shorteners.json"
          convert_txt_to_adblock "Data/URL Shorteners/url_shorteners.txt" "Data/URL Shorteners/url_shorteners.adblock"

          convert_txt_to_json "Data/Domain Hosting Providers/domain_hosting_providers.txt" "Data/Domain Hosting Providers/domain_hosting_providers.json"
          convert_txt_to_adblock "Data/Domain Hosting Providers/domain_hosting_providers.txt" "Data/Domain Hosting Providers/domain_hosting_providers.adblock"

          convert_txt_to_json "Data/URL Tracking Parameters/url_tracking_parameters.txt" "Data/URL Tracking Parameters/url_tracking_parameters.json"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            exit 0
          fi
          git commit -m "Formatted files [AUTOMATIC]"
          git push --force
