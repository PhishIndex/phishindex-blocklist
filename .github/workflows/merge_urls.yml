name: Merge URLs

on:
  schedule:
    - cron: '0 * * * *' 

jobs:
  merge_urls:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
        
      - name: Read and merge URLs
        run: |
          external_urls=$(cat Malicious_URLs/external_urls)
          phishindex_urls=$(cat Malicious_URLs/phishindex_urls)
          
          all_urls=$(echo -e "$external_urls\n$phishindex_urls" | sort -u)
          
          echo "$all_urls" > Malicious_URLs/all_urls

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add Malicious_URLs/all_urls
          git commit -m "Update all URLs" || echo "No changes to commit"
          git push origin main
